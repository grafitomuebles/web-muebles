<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafito Muebles | Diseño y Fabricación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #b8975a; 
            --dark: #111111;
            --light-bg: #f4f4f4;
            --mp-blue: #009ee3;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); color: #333; margin: 0; }
        
        .hero-section {
            background-color: var(--dark);
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            padding: 40px 0 80px 0;
        }

        .hero-container {
            position: relative;
            width: 92%; 
            max-width: 1300px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .hero-image { width: 100%; height: auto; display: block; filter: brightness(0.9); }

        .hero-text-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        .shop-card {
            background: white;
            border: 1px solid #eee;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .shop-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        /* --- MODALES --- */
        .custom-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 2px;
            position: relative;
            padding: 40px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #333;
            z-index: 10;
        }

        .btn-black {
            background: black;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 10px;
            padding: 16px;
            transition: all 0.3s;
            text-align: center;
            display: block;
            width: 100%;
        }
        .btn-black:hover { background: var(--gold); }

        input {
            width: 100%;
            border-bottom: 1px solid #eee;
            padding: 12px 0;
            outline: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--gold); }

    </style>
</head>
<body>

    <header class="hero-section">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-10 mb-10">
            <div class="w-24"></div> <img src="Logo.png" alt="Grafito Muebles" class="h-20">
            <button onclick="toggleAccount()" class="text-white text-[10px] uppercase tracking-widest border border-white/20 px-4 py-2 hover:bg-white hover:text-black transition">
                Mi Cuenta
            </button>
        </div>
        
        <div class="hero-container">
            <img src="principal.png" alt="Diseño Grafito" class="hero-image">
            <div class="hero-text-overlay">
                <h2 class="text-white text-xl md:text-4xl font-light tracking-[0.4em] uppercase text-center px-4">
                    Tu diseño, tu espacio, tu mueble
                </h2>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <div class="text-center mb-16">
            <h3 class="text-[#b8975a] text-xs uppercase tracking-[0.3em] font-semibold mb-2">Catálogo</h3>
            <h4 class="text-2xl uppercase tracking-widest font-light">Tienda Online</h4>
            <div class="w-10 h-px bg-[#b8975a] mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="shop-card p-6 rounded-sm text-center">
                <div class="aspect-square mb-6 bg-gray-50 flex items-center justify-center p-4">
                    <img src="mesaratonamoderna.png" alt="Mesa Ratona Moderna" class="max-h-full">
                </div>
                <h5 class="text-sm uppercase tracking-wider mb-2">Mesa Ratona Moderna</h5>
                <p class="text-gray-500 text-sm mb-6">$ 3.500</p>
                <button onclick="openProduct('Mesa Ratona Moderna', '3.500', 'mesaratonamoderna.png', 'Mesa ratona moderna en Melamina 18mm.', 'https://mpago.la/2xELQkQ')" 
                        class="btn-black">
                    Ver Detalle
                </button>
            </div>
        </div>
    </main>

    <div id="productModal" class="custom-modal">
        <div class="modal-content max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-10">
            <span class="close-modal" onclick="closeModal('productModal')">&times;</span>
            <img id="modalImg" src="" class="w-full h-auto rounded">
            <div class="flex flex-col justify-center">
                <h2 id="modalTitle" class="text-3xl uppercase font-semibold mb-2"></h2>
                <p id="modalPrice" class="text-[#b8975a] text-2xl mb-8 font-light"></p>
                <p id="modalDesc" class="text-gray-600 text-sm mb-8 leading-relaxed"></p>
                <a id="btnComprarMP" href="#" target="_blank" class="btn-black bg-[#009ee3] mb-4">Comprar ahora</a>
                <a id="btnWAMedida" href="#" target="_blank" class="btn-black bg-white !text-black border border-black">Consultar a medida</a>
            </div>
        </div>
    </div>

    <div id="accountModal" class="custom-modal">
        <div class="modal-content max-w-md">
            <span class="close-modal" onclick="closeModal('accountModal')">&times;</span>
            
            <div id="authView">
                <h2 class="text-xl uppercase tracking-widest mb-8 font-light text-center">Ingreso Clientes</h2>
                <input type="email" id="authEmail" placeholder="Email">
                <input type="password" id="authPass" placeholder="Contraseña">
                <button onclick="handleAuth('login')" class="btn-black mb-4">Entrar</button>
                <button onclick="handleAuth('register')" class="text-[10px] uppercase tracking-widest text-gray-400 w-full text-center hover:text-black transition">Crear cuenta nueva</button>
            </div>

            <div id="profileView" class="hidden">
                <h2 class="text-xl uppercase tracking-widest mb-2 font-light">Mi Perfil</h2>
                <p id="userWelcome" class="text-[10px] text-zinc-400 uppercase mb-8 tracking-widest"></p>
                
                <label class="text-[9px] uppercase text-zinc-400 tracking-widest">Teléfono de contacto</label>
                <input type="text" id="userPhone" placeholder="Ej: 2494...">
                
                <label class="text-[9px] uppercase text-zinc-400 tracking-widest">Dirección en Tandil / Ciudad</label>
                <input type="text" id="userAddress" placeholder="Calle y altura">
                
                <button onclick="saveUserData()" class="btn-black mb-6">Guardar Datos</button>
                <button onclick="logout()" class="text-red-400 text-[10px] uppercase tracking-widest w-full text-center">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <footer class="bg-black py-10">
        <p class="text-center text-gray-500 text-[10px] uppercase tracking-[0.3em]">Grafito Muebles - Tandil</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ7AZGQNxlr64sjctz_Htuq-SgaR8Ji2s",
            authDomain: "grafito-muebles.firebaseapp.com",
            projectId: "grafito-muebles",
            storageBucket: "grafito-muebles.firebasestorage.app",
            messagingSenderId: "16857272065",
            appId: "1:16857272065:web:2641ab3f8c2acf9e9f1500"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Logic
        window.handleAuth = async (type) => {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            try {
                if(type === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Error: " + e.message); }
        };

        window.logout = () => signOut(auth);

        window.saveUserData = async () => {
            const user = auth.currentUser;
            const data = {
                phone: document.getElementById('userPhone').value,
                address: document.getElementById('userAddress').value
            };
            await setDoc(doc(db, "usuarios", user.uid), data, { merge: true });
            alert("Datos actualizados correctamente.");
        };

        onAuthStateChanged(auth, async (user) => {
            const authView = document.getElementById('authView');
            const profileView = document.getElementById('profileView');
            if (user) {
                authView.classList.add('hidden');
                profileView.classList.remove('hidden');
                document.getElementById('userWelcome').innerText = "Sesión iniciada: " + user.email;
                const snap = await getDoc(doc(db, "usuarios", user.uid));
                if(snap.exists()){
                    document.getElementById('userPhone').value = snap.data().phone || "";
                    document.getElementById('userAddress').value = snap.data().address || "";
                }
            } else {
                authView.classList.remove('hidden');
                profileView.classList.add('hidden');
            }
        });
    </script>

    <script>
        // UI Logic
        function openProduct(name, price, img, desc, mpLink) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = '$ ' + price;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('btnComprarMP').href = mpLink;
            document.getElementById('btnWAMedida').href = "https://wa.me/5492494362196?text=Hola! Me interesa la " + name;
            document.getElementById('productModal').style.display = 'block';
        }

        function toggleAccount() {
            document.getElementById('accountModal').style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        window.onclick = (event) => {
            if (event.target.className === 'custom-modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
