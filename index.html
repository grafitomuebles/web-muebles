<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafito Muebles | Diseño y Fabricación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #b8975a; 
            --dark: #111111;
            --light-bg: #f4f4f4;
            --mp-blue: #009ee3;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); color: #333; margin: 0; }
        
        .hero-section {
            background-color: var(--dark);
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            padding: 40px 0 80px 0;
        }

        .hero-container {
            position: relative;
            width: 92%; 
            max-width: 1300px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .hero-image { width: 100%; height: auto; display: block; filter: brightness(0.9); }

        .hero-text-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        .shop-card {
            background: white;
            border: 1px solid #eee;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .shop-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        .wsp-wrapper {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 9999;
            display: block;
            width: 65px;
            height: 65px;
            transition: transform 0.2s ease-in-out;
        }
        .wsp-wrapper:hover { transform: scale(1.1); }
        .wsp-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); }

        /* --- MODAL --- */
        .product-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 2px;
            position: relative;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; padding: 20px; margin: 10px auto; }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #333;
            line-height: 1;
        }

        .btn-modal {
            text-align: center;
            padding: 16px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
            text-decoration: none;
        }

        .btn-mp { background: var(--mp-blue); color: white; border: 1px solid var(--mp-blue); }
        .btn-mp:hover { background: #007bb5; }

        .btn-wa-medida { background: white; color: var(--dark); border: 1px solid var(--dark); }
        .btn-wa-medida:hover { background: var(--dark); color: white; }

    </style>
</head>
<body>

    <header class="hero-section">
        <div class="text-center mb-10">
            <img src="Logo.png" alt="Grafito Muebles" class="h-24 mx-auto block">
        </div>
        <div class="hero-container">
            <img src="principal.png" alt="Diseño Grafito" class="hero-image">
            <div class="hero-text-overlay">
                <h2 class="text-white text-xl md:text-4xl font-light tracking-[0.4em] uppercase text-center px-4">
                    Tu diseño, tu espacio, tu mueble
                </h2>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <div class="text-center mb-16">
            <h3 class="text-[#b8975a] text-xs uppercase tracking-[0.3em] font-semibold mb-2">Catálogo</h3>
            <h4 class="text-2xl uppercase tracking-widest font-light">Tienda Online</h4>
            <div class="w-10 h-px bg-[#b8975a] mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="shop-card p-6 rounded-sm text-center">
                <div class="aspect-square mb-6 bg-gray-50 flex items-center justify-center p-4">
                    <img src="Mueble01.png" alt="Mesa Ratona Moderna" class="max-h-full">
                </div>
                <h5 class="text-sm uppercase tracking-wider mb-2">Mesa Ratona Moderna</h5>
                <p class="text-gray-500 text-sm mb-6">$ 3.500</p>
                <button onclick="openProduct('Mesa Ratona Moderna', '3.500', 'Mueble01.png', 'Mesa ratona moderna en Melamina 18mm. Ideal para tu living.', 'https://mpago.la/2xELQkQ')" 
                        class="inline-block w-full py-3 bg-black text-white text-[10px] uppercase tracking-widest hover:bg-[#b8975a] transition">
                    Ver Detalle
                </button>
            </div>
            </div>
    </main>

    <div id="productModal" class="product-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProduct()">&times;</span>
            <div class="product-gallery">
                <img id="modalImg" src="" alt="" class="w-full h-auto rounded shadow-sm">
            </div>
            <div class="product-info flex flex-col justify-center">
                <h2 id="modalTitle" class="text-3xl uppercase tracking-tighter mb-2 font-semibold"></h2>
                <p id="modalPrice" class="text-[#b8975a] text-2xl mb-8 font-light"></p>
                
                <div class="border-t border-gray-100 py-6">
                    <h3 class="text-[10px] uppercase tracking-widest font-bold mb-3 text-gray-400">Descripción Técnica</h3>
                    <p id="modalDesc" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
                </div>

                <a id="btnComprarMP" href="#" target="_blank" class="btn-modal btn-mp">Comprar ahora</a>
                <a id="btnWAMedida" href="https://wa.me/5492494362196" target="_blank" class="btn-modal btn-wa-medida">Consultar a medida</a>
            </div>
        </div>
    </div>

    <footer class="bg-black py-10">
        <p class="text-center text-gray-500 text-[10px] uppercase tracking-[0.3em]">Grafito Muebles - Tandil</p>
    </footer>

    <script>
        function openProduct(name, price, img, desc, mpLink) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = '$ ' + price;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('btnComprarMP').href = mpLink;
            document.getElementById('btnWAMedida').href = "https://wa.me/5492494362196?text=Hola! Me interesa la " + name + " a medida.";
            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeProduct() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }
    </script>
</body>
</html>
