<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafito Muebles | Diseño y Fabricación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #b8975a; 
            --dark: #111111;
            --light-bg: #f4f4f4;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); color: #333; margin: 0; }
        
        /* Fondo con cuadrícula técnica */
        .hero-section {
            background-color: var(--dark);
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            padding: 40px 0 80px 0;
        }

        /* Contenedor de la imagen principal */
        .hero-container {
            position: relative;
            width: 92%; 
            max-width: 1300px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(0.9);
        }

        .hero-text-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        /* Tarjetas de productos */
        .shop-card {
            background: white;
            border: 1px solid #eee;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .shop-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        /* Botón de WhatsApp a la izquierda */
        .wsp-wrapper {
            position: fixed;
            bottom: 25px;
            left: 25px; /* Cambiado a la izquierda */
            z-index: 9999;
            display: block;
            width: 65px;
            height: 65px;
            transition: transform 0.2s ease-in-out;
        }

        .wsp-wrapper:hover {
            transform: scale(1.1);
        }

        .wsp-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); 
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="text-center mb-10">
            <img src="Logo.png" alt="Grafito Muebles" class="h-24 mx-auto block">
        </div>

        <div class="hero-container">
            <img src="principal.png" alt="Diseño de Cocina Grafito" class="hero-image">
            <div class="hero-text-overlay">
                <h2 class="text-white text-xl md:text-4xl font-light tracking-[0.4em] uppercase text-center px-4">
                    Tu diseño, tu espacio, tu mueble
                </h2>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <div class="text-center mb-16">
            <h3 class="text-[#b8975a] text-xs uppercase tracking-[0.3em] font-semibold mb-2">Catálogo</h3>
            <h4 class="text-2xl uppercase tracking-widest font-light">Tienda Online</h4>
            <div class="w-10 h-px bg-[#b8975a] mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="shop-card p-6 rounded-sm text-center">
                <div class="aspect-square mb-6 bg-gray-50 flex items-center justify-center p-4">
                    <img src="Mueble01.png" alt="Mesa Nebraska" class="max-h-full">
                </div>
                <h5 class="text-sm uppercase tracking-wider mb-2">Mesa Nebraska</h5>
                <p class="text-gray-500 text-sm mb-6">$ 85.000</p>
                <a href="https://wa.me/5492494362196" class="inline-block w-full py-3 bg-black text-white text-[10px] uppercase tracking-widest hover:bg-[#b8975a] transition">
                    Ver Detalle
                </a>
            </div>

            <div class="shop-card p-6 rounded-sm text-center">
                <div class="aspect-square mb-6 bg-gray-50 flex items-center justify-center p-4">
                    <img src="vestidor.png" alt="Módulo Vestidor" class="max-h-full">
                </div>
                <h5 class="text-sm uppercase tracking-wider mb-2">Módulo Vestidor</h5>
                <p class="text-gray-500 text-sm mb-6">$ 120.000</p>
                <a href="https://wa.me/5492494362196" class="inline-block w-full py-3 bg-black text-white text-[10px] uppercase tracking-widest hover:bg-[#b8975a] transition">
                    Ver Detalle
                </a>
            </div>

            <div class="shop-card p-6 rounded-sm text-center">
                <div class="aspect-square mb-6 bg-gray-50 flex items-center justify-center p-4">
                    <img src="living.png" alt="Rack TV" class="max-h-full">
                </div>
                <h5 class="text-sm uppercase tracking-wider mb-2">Rack de TV</h5>
                <p class="text-gray-500 text-sm mb-6">$ 95.000</p>
                <a href="https://wa.me/5492494362196" class="inline-block w-full py-3 bg-black text-white text-[10px] uppercase tracking-widest hover:bg-[#b8975a] transition">
                    Ver Detalle
                </a>
            </div>
        </div>
    </main>

    <a href="https://wa.me/5492494362196" class="wsp-wrapper" target="_blank">
        <img src="image_0585c8.png" alt="WhatsApp" class="wsp-img">
    </a>

    <footer class="bg-black py-10 border-t border-white/5">
        <p class="text-center text-gray-500 text-[10px] uppercase tracking-[0.3em]">
            Grafito Muebles - Tandil, Buenos Aires
        </p>
    </footer>

</body>
</html>
