<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafito Muebles | Diseño y Fabricación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #b8975a; 
            --dark: #111111;
            --light-bg: #f4f4f4;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); color: #333; }
        
        /* Sección Superior Oscura con Grilla */
        .hero-dark {
            background-color: var(--dark);
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .text-gold { color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        
        /* Imagen Hero con el texto superpuesto */
        .hero-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }
        .hero-text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 20px 0;
            backdrop-filter: blur(2px);
        }

        /* Tarjetas de la Tienda */
        .shop-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            transition: all 0.3s ease;
        }
        .shop-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header class="hero-dark pt-12 pb-20 px-6">
        <div class="max-w-5xl mx-auto text-center">
            <div class="mb-8">
                <img src="Logo.png" alt="Grafito Muebles" class="h-20 mx-auto brightness-200">
            </div>

            <div class="mb-16">
                <p class="text-gold text-[10px] tracking-[0.3em] uppercase mb-10">Como lo hacemos</p>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-4xl mx-auto">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-10 h-10 border border-gold/50 rounded-full flex items-center justify-center text-gold text-lg">⊕</div>
                        <span class="text-white text-[10px] uppercase tracking-widest">Entrevista inicial</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-10 h-10 border border-gold/50 rounded-full flex items-center justify-center text-gold text-lg">📋</div>
                        <span class="text-white text-[10px] uppercase tracking-widest">Proyecto</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-10 h-10 border border-gold/50 rounded-full flex items-center justify-center text-gold text-lg">📏</div>
                        <span class="text-white text-[10px] uppercase tracking-widest">Medidas</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-10 h-10 border border-gold/50 rounded-full flex items-center justify-center text-gold text-lg">📐</div>
                        <span class="text-white text-[10px] uppercase tracking-widest">Presupuesto</span>
                    </div>
                </div>
            </div>

            <div class="hero-container shadow-2xl rounded-sm overflow-hidden">
                <img src="principal.png" alt="Cocina Grafito" class="w-full object-cover h-[400px]">
                <div class="hero-text-overlay">
                    <h2 class="text-white text-xl md:text-3xl font-light tracking-[0.2em] uppercase">
                        Tu diseño, tu espacio, tu mueble
                    </h2>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 -mt-10 pb-24">
        <div class="text-center mb-12">
            <h3 class="text-gold text-2xl tracking-[0.15em] uppercase font-light">Tienda Online</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="shop-card p-6 flex flex-col items-center">
                <div class="w-full aspect-square mb-6 overflow-hidden flex items-center justify-center bg-gray-50 rounded-lg">
                    <img src="Mueble01.png" alt="Mesa Nebraska" class="max-h-full object-contain p-4">
                </div>
                <h4 class="text-gray-800 text-lg mb-1">Mesa Nebraska</h4>
                <p class="text-gray-600 font-semibold mb-6">$ 85.000</p>
                <a href="LINK_DE_PAGO_1" class="w-full py-3 bg-[#444] text-white text-[10px] uppercase tracking-widest rounded-md hover:bg-black transition text-center">
                    Ver detalle
                </a>
            </div>

            <div class="shop-card p-6 flex flex-col items-center">
                <div class="w-full aspect-square mb-6 overflow-hidden flex items-center justify-center bg-gray-50 rounded-lg">
                    <img src="vestidor.png" alt="Módulo Vestidor" class="max-h-full object-contain p-4">
                </div>
                <h4 class="text-gray-800 text-lg mb-1">Módulo Vestidor</h4>
                <p class="text-gray-600 font-semibold mb-6">$ 120.000</p>
                <a href="LINK_DE_PAGO_2" class="w-full py-3 bg-[#444] text-white text-[10px] uppercase tracking-widest rounded-md hover:bg-black transition text-center">
                    Ver detalle
                </a>
            </div>

            <div class="shop-card p-6 flex flex-col items-center">
                <div class="w-full aspect-square mb-6 overflow-hidden flex items-center justify-center bg-gray-50 rounded-lg">
                    <img src="living.png" alt="Rack de TV" class="max-h-full object-contain p-4">
                </div>
                <h4 class="text-gray-800 text-lg mb-1">Rack de TV</h4>
                <p class="text-gray-600 font-semibold mb-6">$ 95.000</p>
                <a href="LINK_DE_PAGO_3" class="w-full py-3 bg-[#444] text-white text-[10px] uppercase tracking-widest rounded-md hover:bg-black transition text-center">
                    Ver detalle
                </a>
            </div>

        </div>
    </main>

    <footer class="bg-black py-12 px-6 border-t border-gold/20">
        <div class="max-w-5xl mx-auto text-center">
            <div class="w-16 h-px bg-gold/50 mx-auto mb-8"></div>
            <p class="text-gray-400 text-[10px] tracking-[0.3em] uppercase">
                Alejandro G. & Thomas B. - Tandil, Argentina
            </p>
        </div>
    </footer>

</body>
</html>
