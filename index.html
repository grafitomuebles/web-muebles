        /* Fondo con cuadrícula técnica */
        .hero-section {

        /* Contenedor de la imagen principal */

            width: 92%; /* Espacio a los costados */

            margin: 0 auto;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            /* Filtro suave para que el texto resalte sin quemar la imagen */
            filter: brightness(0.9);
        }

        .hero-text-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        /* Tarjetas de productos */
        .shop-card {
            background: white;
            border: 1px solid #eee;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .shop-card:hover {
            transform: translateY(-8px);
